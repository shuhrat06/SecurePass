<!DOCTYPE html>
<html lang="zxx">
{% load static %}
<head>
    <title>404</title>
    <!-- Meta tag Keywords -->
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta charset="UTF-8" />

    <!-- google fonts -->
    <link href="https://fonts.googleapis.com/css?family=Work+Sans:400,500,600,700&display=swap" rel="stylesheet">

    <!-- //google fonts -->

    <!--/Style-CSS -->
    <link rel="stylesheet" href="{% static '404/css/style.css' %}" type="text/css" media="all" />
    <!--//Style-CSS -->
</head>

<body>
    <div class="w3l-error-block">

        <div class="page">
            <div class="content">
                <div class="logo">
                    <a class="brand-logo" href="">Xatolik 404</a>
                </div>
                <div class="w3l-error-grid">
                    <h1>404</h1>
                    <h2>Sahifa topilmadi</h2>
                    <p class="error-description">Uzr, siz qidirayotgan sahifa mavjud emas yoki boshqa manzilga ko'chirilgan.</p>
                    
                    <!-- Asosiyga qaytish button - sodda va chiroyli -->
                    <div class="button-wrapper">
                        <a href="{% url 'home' %}" class="return-btn" style="color: red;">
                            Asosiyga qaytish
                        </a>
                    </div>
                </div>       
            </div>
            <img src="{% static '404/images/bg.jpg' %}" class="img-responsive" alt="error image" />
        </div>

        <script src="{% static '404/js/jquery-3.3.1.min.js' %}"></script>
        <script>
            var lFollowX = 0,
                lFollowY = 0,
                x = 0,
                y = 0,
                friction = 1 / 30;

            function animate() {
                x += (lFollowX - x) * friction;
                y += (lFollowY - y) * friction;

                translate = 'translate(' + x + 'px, ' + y + 'px) scale(1.1)';

                $('img').css({
                    '-webit-transform': translate,
                    '-moz-transform': translate,
                    'transform': translate
                });

                window.requestAnimationFrame(animate);
            }

            $(window).on('mousemove click', function (e) {

                var lMouseX = Math.max(-100, Math.min(100, $(window).width() / 2 - e.clientX));
                var lMouseY = Math.max(-100, Math.min(100, $(window).height() / 2 - e.clientY));
                lFollowX = (20 * lMouseX) / 100;
                lFollowY = (10 * lMouseY) / 100;

            });

            animate();
        </script>
    </div>
</body>

</html>
