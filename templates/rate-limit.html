<!DOCTYPE html>
<html lang="uz">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tizimga kirish</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: #f9f9f9;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #222;
        }

        .login-box {
            position: relative;
            background-color: #fff;
            padding: 60px 65px;
            background-color: #fff;
            padding: 60px 65px;
            /* ichki bo'shliq biroz kattaroq */
            border: 1px solid #e5e5e5;
            border-radius: 18px;
            box-shadow: 0 8px 22px rgba(0, 0, 0, 0.06);
            width: 100%;
            max-width: 460px;
            /* ilgari 380 edi — endi 460 */
            transition: all 0.3s ease;
        }

        .login-box:hover {
            box-shadow: 0 10px 28px rgba(0, 0, 0, 0.08);
            transform: translateY(-2px);
        }

        .login-box h2 {
            text-align: center;
            margin-bottom: 40px;
            font-size: 1.7rem;
            font-weight: 600;
            color: #222;
        }

        .back-link {
            position: absolute;
            top: 20px;
            left: 20px;

            display: inline-flex;
            align-items: center;
            gap: 6px;

            font-size: 0.95rem;
            color: #007aff;
            cursor: pointer;

            padding: 6px 10px;
            border-radius: 8px;

            transition: all 0.2s ease;
        }

        .back-link a {
            text-decoration: none;
            color: #007aff;
        }

        .back-link:hover {
            background-color: rgba(0, 122, 255, 0.08);
        }

        .back-link:active {
            transform: scale(0.96);
        }

        .auth-links {
            display: flex;
            flex-direction: column;
            gap: 14px;
            margin-top: 25px;
        }

        .auth-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;

            padding: 14px 18px;
            border-radius: 12px;

            text-decoration: none;
            font-weight: 500;
            font-size: 1rem;

            transition: all 0.25s ease;
            border: 1px solid transparent;

            box-shadow: 0 6px 16px rgba(0, 0, 0, 0.06);
        }

        /* Kirish button */
        .auth-btn.login {
            background: linear-gradient(135deg, #007aff, #0056d6);
            color: white;
        }

        .auth-btn.login:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 22px rgba(0, 122, 255, 0.25);
        }

        /* Ro'yxatdan o'tish button */
        .auth-btn.register {
            background: #fff;
            color: #007aff;
            border: 1px solid rgba(0, 122, 255, 0.3);
        }

        .auth-btn.register:hover {
            background: rgba(0, 122, 255, 0.06);
            transform: translateY(-2px);
        }

        /* click effect */
        .auth-btn:active {
            transform: scale(0.97);
        }

        @media (max-width: 550px) {
            .login-box {
                padding: 40px 30px;
                border-radius: 14px;
                max-width: 90%;
            }

            .login-box h2 {
                font-size: 1.5rem;
                margin-bottom: 30px;
            }
        }
    </style>
</head>

<body>

    <div class="login-box">
        <div class="back-link">
            <i class="fa-solid fa-house"></i>
            <a href="{% url 'home' %}">Asosiy sahifa</a>
        </div>
        <h2>Juda ko'p kirishga urinish sodir etildi!</h2>
        <div class="auth-links">
            <a href="{% url 'login' %}" class="auth-btn login">
                <i class="fa-solid fa-right-to-bracket"></i>
                Kirish
            </a>

            <a href="{% url 'register' %}" class="auth-btn register">
                <i class="fa-solid fa-user-plus"></i>
                Ro'yxatdan o'tish
            </a>
        </div>
    </div>
</body>

</html>
